<body>
  <div class="container">
    <h1>🧪 排班挑战单元测试</h1>
    <p class="subtitle">覆盖客流曲线生成、预期统计计算、实际经营数据记录、排班奖励结算及关键分支</p>

    <div class="summary" id="summary">
      <div class="summary-item total">总计：<span class="summary-value" id="totalCount">0</span></div>

      <div class="summary-item fail">失败：<span class="summary-value" id="failCount">0</span></div>
      <button class="run-btn" onclick="runAllTests()">▶ 重新运行测试</button>

    <div id="testResults"></div>

    <div class="log-box">

      <div class="log-content" id="logContent">等待测试运行...</div>

<script>
// ============================================================
// 排班挑战核心逻辑（从 app.js 提取的纯函数，去除 DOM 依赖）
// ============================================================

const goods = {
  snack: { name: "饭团", price: 12, icon: "🍙" },
  drink: { name: "热饮", price: 9, icon: "☕" },
  noodle: { name: "泡面", price: 16, icon: "🍜" }
};

const customerTypes = {
  normal: { id: "normal", name: "普通顾客", icon: "👤", weight: 30, patienceMult: 1.0 },
  worker: { id: "worker", name: "赶时间上班族", icon: "💼", weight: 25, patienceMult: 0.5 },
  nighter: { id: "nighter", name: "夜归人", icon: "🌙", weight: 20, patienceMult: 1.8 },
  picky: { id: "picky", name: "挑剔顾客", icon: "🎯", weight: 15, patienceMult: 1.0 },
  randomer: { id: "randomer", name: "随机顾客", icon: "🎲", weight: 10, patienceMult: 1.2 }
};

const levels = [
  {
    id: 1, name: "街角小店",
    goodKeys: ["snack", "drink", "noodle"],
    duration: 120,
    customerBaseGap: 3,
    customerRandomRange: 2,
    maxWaiting: 8
  }
];

function seededRandom(seed) {
  let s = seed >>> 0;
  return function() {
    s = (s * 1664525 + 1013904223) >>> 0;
    return s / 0xffffffff;
  };
}

function generateBalancedWeights(goodKeys, variance) {
  const weights = {};
  goodKeys.forEach(key => {
    weights[key] = 1.0 + (Math.random() - 0.5) * variance * 2;
  });
  return weights;
}

const STRATEGY_TEMPLATES = {
  steady: {
    id: "steady", name: "平稳客流", icon: "🌙",
    difficulty: "简单", difficultyLevel: 1,
    tips: ["客流基本稳定", "注意货架不要空置", "体力消耗均匀"],
    generateCurve: (totalTicks, goodKeys) => {
      const curve = [];
      for (let t = 0; t < totalTicks; t++) {
        const progress = t / totalTicks;
        let intensity = 1.0;
        if (progress < 0.1) intensity = 0.7 + progress * 3;
        else if (progress > 0.85) intensity = 1.0 - (progress - 0.85) * 4;
        curve.push({
          tick: t,
          intensity: Math.max(0.4, intensity + (Math.random() - 0.5) * 0.3),
          goodWeights: generateBalancedWeights(goodKeys, 0.2)
        });
      }
      return curve;
    }
  },
  rushHour: {
    id: "rushHour", name: "下班高峰", icon: "🚶",
    difficulty: "中等", difficultyLevel: 2,
    tips: ["高峰在中段", "提前补满库存", "热饮需求旺盛"],
    generateCurve: (totalTicks, goodKeys) => {
      const curve = [];
      const peakStart = Math.floor(totalTicks * 0.3);
      const peakEnd = Math.floor(totalTicks * 0.65);
      const peakCenter = (peakStart + peakEnd) / 2;
      for (let t = 0; t < totalTicks; t++) {
        let intensity;
        if (t < peakStart) {
          intensity = 0.5 + (t / peakStart) * 0.3;
        } else if (t > peakEnd) {
          const decay = (t - peakEnd) / (totalTicks - peakEnd);
          intensity = 1.0 - decay * 0.5;
        } else {
          const dist = Math.abs(t - peakCenter) / ((peakEnd - peakStart) / 2);
          intensity = 1.8 - dist * 0.6;
        }
        intensity += (Math.random() - 0.5) * 0.25;
        const weights = {};
        if (t >= peakStart && t <= peakEnd) {
          weights[goodKeys[0]] = 0.8 + Math.random() * 0.3;
          weights[goodKeys[1]] = 1.2 + Math.random() * 0.4;
          weights[goodKeys[2 % goodKeys.length]] = 1.0 + Math.random() * 0.2;
        } else {
          Object.assign(weights, generateBalancedWeights(goodKeys, 0.15));
        }
        curve.push({
          tick: t,
          intensity: Math.max(0.4, intensity),
          goodWeights: weights
        });
      }
      return curve;
    }
  },
  randomBurst: {
    id: "randomBurst", name: "随机爆单", icon: "⚡",
    difficulty: "困难", difficultyLevel: 3,
    tips: ["爆单点不可预测", "每次补货尽量补满", "体力要预留"],
    generateCurve: (totalTicks, goodKeys) => {
      const curve = [];
      const burstCount = 2 + Math.floor(Math.random() * 2);
      const burstPositions = [];
      for (let i = 0; i < burstCount; i++) {
        burstPositions.push(Math.floor(totalTicks * (0.2 + (i / burstCount) * 0.6 + (Math.random() - 0.5) * 0.1)));
      }
      const burstWidth = Math.max(2, Math.floor(totalTicks * 0.08));
      for (let t = 0; t < totalTicks; t++) {
        let intensity = 0.6 + Math.random() * 0.3;
        for (const pos of burstPositions) {
          const dist = Math.abs(t - pos);
          if (dist < burstWidth) {
            const boost = (1 - dist / burstWidth) * 1.6;
            intensity += boost;
          }
        }
        const weights = {};
        goodKeys.forEach(key => {
          weights[key] = 0.6 + Math.random() * 1.2;
        });
        curve.push({
          tick: t,
          intensity: Math.max(0.4, Math.min(2.5, intensity)),
          goodWeights: weights
        });
      }
      return curve;
    }
  },
  preferenceShift: {
    id: "preferenceShift", name: "商品偏好波动", icon: "📊",
    difficulty: "困难", difficultyLevel: 3,
    tips: ["热门商品周期性切换", "优先补热销货架", "保持灵活"],
    generateCurve: (totalTicks, goodKeys) => {
      const curve = [];
      const phaseCount = 3 + Math.floor(Math.random() * 2);
      const phaseLength = Math.floor(totalTicks / phaseCount);
      for (let t = 0; t < totalTicks; t++) {
        const phase = Math.min(phaseCount - 1, Math.floor(t / phaseLength));
        const phaseProgress = (t % phaseLength) / phaseLength;
        const baseIntensity = 0.85 + (Math.random() - 0.5) * 0.2;
        const weights = {};
        const favoredIndex = phase % goodKeys.length;
        const nextFavoredIndex = (phase + 1) % goodKeys.length;
        goodKeys.forEach((key, idx) => {
          if (idx === favoredIndex) {
            weights[key] = 1.8 - phaseProgress * 0.8 + (Math.random() - 0.5) * 0.2;
          } else if (idx === nextFavoredIndex) {
            weights[key] = 0.8 + phaseProgress * 1.0 + (Math.random() - 0.5) * 0.2;
          } else {
            weights[key] = 0.5 + Math.random() * 0.3;
          }
        });
        curve.push({
          tick: t,
          intensity: baseIntensity,
          goodWeights: weights
        });
      }
      return curve;
    }
  }
};

const schedulingState = {
  active: false,
  selectedStrategy: null,
  generatedCurve: null,
  previewData: null,
  expectedStats: null,
  actualStats: {
    customersByTick: [],
    demandByGood: {},
    totalServed: 0,
    totalMissed: 0
  }
};

function calculateExpectedStats(curve, goodKeys, level) {
  let totalExpectedCustomers = 0;
  const expectedDemandByGood = {};
  const expectedCustomerTypes = {};
  goodKeys.forEach(key => expectedDemandByGood[key] = 0);
  Object.keys(customerTypes).forEach(type => expectedCustomerTypes[type] = 0);
  let maxIntensity = 0;
  let pressureTicks = 0;
  curve.forEach((segment) => {
    const arrivalRate = level.customerBaseGap > 0 ? segment.intensity / level.customerBaseGap : segment.intensity;
    const expectedCount = Math.max(0, Math.round(arrivalRate * 1.2));
    totalExpectedCustomers += expectedCount;
    if (segment.intensity > maxIntensity) maxIntensity = segment.intensity;
    if (segment.intensity >= 1.3) pressureTicks++;
    goodKeys.forEach(key => {
      const weight = segment.goodWeights[key] || 1;
      const totalWeight = goodKeys.reduce((sum, k) => sum + (segment.goodWeights[k] || 1), 0);
      expectedDemandByGood[key] += Math.round(expectedCount * (weight / totalWeight));
    });
    Object.entries(customerTypes).forEach(([type, ct]) => {
      expectedCustomerTypes[type] += Math.round(expectedCount * (ct.weight / 100));
    });
  });
  const avgPressure = curve.reduce((sum, s) => sum + s.intensity, 0) / curve.length;
  let overallRisk;
  if (avgPressure < 0.9 && pressureTicks < curve.length * 0.2) {
    overallRisk = { label: "低", level: "low" };
  } else if (avgPressure < 1.2 && pressureTicks < curve.length * 0.4) {
    overallRisk = { label: "中", level: "medium" };
  } else {
    overallRisk = { label: "高", level: "high" };
  }
  return {
    totalExpectedCustomers,
    expectedDemandByGood,
    expectedCustomerTypes,
    maxIntensity,
    avgPressure,
    pressureTicks,
    overallRisk,
    curveLength: curve.length
  };
}

function generatePreviewData(curve, stats, goodKeys, strategy) {
  const segments = 20;
  const ticksPerSegment = Math.max(1, Math.ceil(curve.length / segments));
  const curveBars = [];
  for (let i = 0; i < segments; i++) {
    const start = i * ticksPerSegment;
    const end = Math.min(curve.length, start + ticksPerSegment);
    let sum = 0;
    for (let j = start; j < end; j++) {
      sum += curve[j].intensity;
    }
    const avg = sum / (end - start);
    let level = 1;
    if (avg < 0.6) level = 1;
    else if (avg < 0.85) level = 2;
    else if (avg < 1.1) level = 3;
    else if (avg < 1.4) level = 4;
    else if (avg < 1.8) level = 5;
    else level = 6;
    curveBars.push({ level, intensity: avg });
  }
  const goodDemandList = goodKeys.map(key => {
    const demand = stats.expectedDemandByGood[key] || 0;
    const total = Object.values(stats.expectedDemandByGood).reduce((a, b) => a + b, 0) || 1;
    const ratio = demand / total;
    let level;
    if (ratio < 0.25) level = "low";
    else if (ratio < 0.4) level = "medium";
    else level = "high";
    return { key, demand, ratio, level };
  });
  return { curveBars, goodDemandList };
}

function getCurveSegmentForTick(tickIndex) {
  if (!schedulingState.generatedCurve) return null;
  const idx = Math.max(0, Math.min(tickIndex, schedulingState.generatedCurve.length - 1));
  return schedulingState.generatedCurve[idx];
}

function recordActualCustomer(goodKey, tickIndex, served, customerTypeId, isSubstitute) {
  if (!schedulingState.active || !schedulingState.generatedCurve) return;
  const idx = Math.max(0, Math.min(tickIndex, schedulingState.actualStats.customersByTick.length - 1));
  schedulingState.actualStats.customersByTick[idx] += 1;
  if (schedulingState.actualStats.demandByGood[goodKey] !== undefined) {
    schedulingState.actualStats.demandByGood[goodKey] += 1;
  }
  const ctId = customerTypeId || 'normal';
  if (!schedulingState.actualStats.servedByType) schedulingState.actualStats.servedByType = {};
  if (!schedulingState.actualStats.missedByType) schedulingState.actualStats.missedByType = {};
  if (!schedulingState.actualStats.substituteServed) schedulingState.actualStats.substituteServed = 0;
  if (!schedulingState.actualStats.substituteMissed) schedulingState.actualStats.substituteMissed = 0;
  if (!schedulingState.actualStats.substituteServedByType) schedulingState.actualStats.substituteServedByType = {};
  if (served) {
    schedulingState.actualStats.totalServed += 1;
    if (isSubstitute) {
      schedulingState.actualStats.substituteServed += 1;
      const subKey = 'substitute_' + ctId;
      schedulingState.actualStats.substituteServedByType[subKey] = (schedulingState.actualStats.substituteServedByType[subKey] || 0) + 1;
    } else {
      schedulingState.actualStats.servedByType[ctId] = (schedulingState.actualStats.servedByType[ctId] || 0) + 1;
    }
  } else {
    schedulingState.actualStats.totalMissed += 1;
    if (isSubstitute) {
      schedulingState.actualStats.substituteMissed += 1;
    }
    schedulingState.actualStats.missedByType[ctId] = (schedulingState.actualStats.missedByType[ctId] || 0) + 1;
  }
}

function calculateSchedulingBonus(serviceRate, missed) {
  let bonus = 0;
  const strategy = STRATEGY_TEMPLATES[schedulingState.selectedStrategy];
  if (!strategy) return 0;
  const difficultyMult = strategy.difficultyLevel;
  if (serviceRate >= 85) bonus += 30 * difficultyMult;
  else if (serviceRate >= 70) bonus += 15 * difficultyMult;
  if (missed === 0) bonus += 20 * difficultyMult;
  else if (missed <= 2) bonus += 10 * difficultyMult;
  return bonus;
}

function resetSchedulingState() {
  schedulingState.active = false;
  schedulingState.selectedStrategy = null;
  schedulingState.generatedCurve = null;
  schedulingState.previewData = null;
  schedulingState.expectedStats = null;
  schedulingState.actualStats = {
    customersByTick: [],
    demandByGood: {},
    totalServed: 0,
    totalMissed: 0
  };
}

function initActualStats(goodKeys) {
  schedulingState.actualStats = {
    customersByTick: new Array(schedulingState.generatedCurve.length).fill(0),
    demandByGood: {},
    totalServed: 0,
    totalMissed: 0,
    servedByType: {},
    missedByType: {},
    substituteServed: 0,
    substituteMissed: 0
  };
  goodKeys.forEach(key => {
    schedulingState.actualStats.demandByGood[key] = 0;
  });
}

const TRAINING_THEMES = {
  scheduling: {
    id: "scheduling",
    name: "排班预测练习",
    config: {
      showPreview: true,
      forceStrategy: "rushHour",
      durationMultiplier: 1.0
    }
  }
};

// ============================================================
// 轻量级测试框架
// ============================================================

const testResults = [];
let currentSuite = null;
let logLines = [];

function log(msg) {
  const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  logLines.push(`[${time}] ${msg}`);
}

function describe(name, fn) {
  currentSuite = { name, tests: [], beforeEach: null, afterEach: null };
  fn();
  testResults.push(currentSuite);
}

function beforeEach(fn) {
  if (currentSuite) currentSuite.beforeEach = fn;
}

function afterEach(fn) {
  if (currentSuite) currentSuite.afterEach = fn;
}

function it(name, fn) {
  if (!currentSuite) return;
  currentSuite.tests.push({ name, fn });
}

function expect(actual) {
  return {
    toBe(expected) {
      if (actual !== expected) {
        throw new Error(`期望 ${JSON.stringify(expected)}，实际 ${JSON.stringify(actual)}`);
      }
    },
    toEqual(expected) {
      const a = JSON.stringify(actual);
      const b = JSON.stringify(expected);
      if (a !== b) {
        throw new Error(`期望 ${b}，实际 ${a}`);
      }
    },
    toBeGreaterThan(expected) {
      if (!(actual > expected)) {
        throw new Error(`期望 ${actual} > ${expected}`);
      }
    },
    toBeLessThan(expected) {
      if (!(actual < expected)) {
        throw new Error(`期望 ${actual} < ${expected}`);
      }
    },
    toBeGreaterThanOrEqual(expected) {
      if (!(actual >= expected)) {
        throw new Error(`期望 ${actual} >= ${expected}`);
      }
    },
    toBeLessThanOrEqual(expected) {
      if (!(actual <= expected)) {
        throw new Error(`期望 ${actual} <= ${expected}`);
      }
    },
    toBeTruthy() {
      if (!actual) {
        throw new Error(`期望真值，实际 ${JSON.stringify(actual)}`);
      }
    },
    toBeFalsy() {
      if (actual) {
        throw new Error(`期望假值，实际 ${JSON.stringify(actual)}`);
      }
    },
    toBeNull() {
      if (actual !== null) {
        throw new Error(`期望 null，实际 ${JSON.stringify(actual)}`);
      }
    },
    toBeDefined() {
      if (actual === undefined) {
        throw new Error(`期望已定义，实际为 undefined`);
      }
    },
    toContain(item) {
      if (!Array.isArray(actual) || !actual.includes(item)) {
        throw new Error(`期望数组包含 ${JSON.stringify(item)}，实际 ${JSON.stringify(actual)}`);
      }
    },
    toHaveLength(len) {
      if (actual.length !== len) {
        throw new Error(`期望长度 ${len}，实际 ${actual.length}`);
      }
    },
    toBeCloseTo(expected, precision = 2) {
      const threshold = Math.pow(10, -precision) / 2;
      if (Math.abs(actual - expected) > threshold) {
        throw new Error(`期望接近 ${expected}，实际 ${actual}`);
      }
    }
  };
}

// ============================================================
// 测试用例
// ============================================================

describe('客流曲线生成', () => {

  it('seededRandom 应生成稳定的伪随机序列（固定seed结果一致）', () => {
    const rand1 = seededRandom(42);
    const rand2 = seededRandom(42);
    for (let i = 0; i < 10; i++) {
      expect(rand1()).toBeCloseTo(rand2(), 8);
    }
  });

  it('seededRandom 不同seed应生成不同序列', () => {
    const rand1 = seededRandom(42);
    const rand2 = seededRandom(99);
    let hasDiff = false;
    for (let i = 0; i < 5; i++) {
      if (rand1() !== rand2()) { hasDiff = true; break; }
    }
    expect(hasDiff).toBe(true);
  });

  it('平稳客流策略应生成指定长度的曲线', () => {
    Math.random = seededRandom(100);
    const curve = STRATEGY_TEMPLATES.steady.generateCurve(24, ["snack", "drink", "noodle"]);
    expect(curve).toHaveLength(24);
  });

  it('平稳客流曲线每个tick应包含intensity和goodWeights', () => {
    Math.random = seededRandom(101);
    const curve = STRATEGY_TEMPLATES.steady.generateCurve(10, ["snack", "drink", "noodle"]);
    curve.forEach(seg => {
      expect(seg.intensity).toBeGreaterThanOrEqual(0.4);
      expect(Object.keys(seg.goodWeights)).toHaveLength(3);
      expect(seg.goodWeights.snack).toBeDefined();
      expect(seg.goodWeights.drink).toBeDefined();
      expect(seg.goodWeights.noodle).toBeDefined();
    });
  });

  it('平稳客流策略：固定seed下结果应完全一致', () => {
    Math.random = seededRandom(2024);
    const curve1 = STRATEGY_TEMPLATES.steady.generateCurve(12, ["snack", "drink", "noodle"]);
    Math.random = seededRandom(2024);
    const curve2 = STRATEGY_TEMPLATES.steady.generateCurve(12, ["snack", "drink", "noodle"]);
    expect(curve1.length).toBe(curve2.length);
    for (let i = 0; i < curve1.length; i++) {
      expect(curve1[i].intensity).toBeCloseTo(curve2[i].intensity, 8);
      expect(curve1[i].goodWeights.snack).toBeCloseTo(curve2[i].goodWeights.snack, 8);
    }
  });

  it('下班高峰策略：高峰时段(30%~65%)强度应高于低峰', () => {
    Math.random = seededRandom(300);
    const totalTicks = 40;
    const curve = STRATEGY_TEMPLATES.rushHour.generateCurve(totalTicks, ["snack", "drink", "noodle"]);
    const peakStart = Math.floor(totalTicks * 0.3);
    const peakEnd = Math.floor(totalTicks * 0.65);
    let peakAvg = 0, lowAvg = 0, peakCount = 0, lowCount = 0;
    curve.forEach((seg, i) => {
      if (i >= peakStart && i <= peakEnd) {
        peakAvg += seg.intensity; peakCount++;
      } else {
        lowAvg += seg.intensity; lowCount++;
      }
    });
    peakAvg /= peakCount; lowAvg /= lowCount;
    expect(peakAvg).toBeGreaterThan(lowAvg);
  });

  it('下班高峰策略：固定seed下结果稳定', () => {
    Math.random = seededRandom(500);
    const c1 = STRATEGY_TEMPLATES.rushHour.generateCurve(20, ["snack", "drink", "noodle"]);
    Math.random = seededRandom(500);
    const c2 = STRATEGY_TEMPLATES.rushHour.generateCurve(20, ["snack", "drink", "noodle"]);
    expect(c1[5].intensity).toBeCloseTo(c2[5].intensity, 8);
    expect(c1[5].goodWeights.drink).toBeCloseTo(c2[5].goodWeights.drink, 8);
  });

  it('随机爆单策略：峰值强度最高应超过1.5', () => {
    Math.random = seededRandom(600);
    const curve = STRATEGY_TEMPLATES.randomBurst.generateCurve(50, ["snack", "drink", "noodle"]);
    const maxIntensity = Math.max(...curve.map(s => s.intensity));
    expect(maxIntensity).toBeGreaterThan(1.5);
  });

  it('商品偏好波动策略：不同阶段应存在favored商品', () => {
    Math.random = seededRandom(700);
    const curve = STRATEGY_TEMPLATES.preferenceShift.generateCurve(30, ["snack", "drink", "noodle"]);
    let foundFavored = false;
    for (let phase = 0; phase < 3; phase++) {
      const seg = curve[phase * 10];
      const weights = Object.values(seg.goodWeights);
      if (Math.max(...weights) > 1.2) { foundFavored = true; break; }
    }
    expect(foundFavored).toBe(true);
  });

  it('generateBalancedWeights 所有权重应在合理范围', () => {
    Math.random = seededRandom(800);
    for (let i = 0; i < 20; i++) {
      const w = generateBalancedWeights(["snack", "drink", "noodle"], 0.3);
      Object.values(w).forEach(v => {
        expect(v).toBeGreaterThanOrEqual(0.7);
        expect(v).toBeLessThanOrEqual(1.3);
      });
    }
  });

});

describe('实际经营数据记录', () => {

  function setupActualStats() {
    resetSchedulingState();
    const origRandom = Math.random;
    Math.random = seededRandom(2000);
    schedulingState.active = true;
    schedulingState.selectedStrategy = "steady";
    schedulingState.generatedCurve = STRATEGY_TEMPLATES.steady.generateCurve(10, ["snack", "drink", "noodle"]);
    initActualStats(["snack", "drink", "noodle"]);
    Math.random = origRandom;
  }

  it('recordActualCustomer 服务成功应增加totalServed', () => {
    setupActualStats();
    recordActualCustomer("snack", 0, true, "normal", false);
    expect(schedulingState.actualStats.totalServed).toBe(1);
    expect(schedulingState.actualStats.totalMissed).toBe(0);
  });

  it('recordActualCustomer 服务失败应增加totalMissed', () => {
    setupActualStats();
    recordActualCustomer("drink", 1, false, "worker", false);
    expect(schedulingState.actualStats.totalServed).toBe(0);
    expect(schedulingState.actualStats.totalMissed).toBe(1);
  });

  it('recordActualCustomer 应正确累加各商品需求', () => {
    setupActualStats();
    recordActualCustomer("snack", 0, true, "normal", false);
    recordActualCustomer("snack", 1, false, "normal", false);
    recordActualCustomer("drink", 2, true, "normal", false);

    expect(schedulingState.actualStats.demandByGood.drink).toBe(1);
    expect(schedulingState.actualStats.demandByGood.noodle).toBe(0);
  });

  it('recordActualCustomer 应按tickIndex记录customersByTick', () => {
    setupActualStats();
    recordActualCustomer("snack", 2, true, "normal", false);
    recordActualCustomer("snack", 2, true, "normal", false);
    recordActualCustomer("drink", 5, true, "normal", false);
    expect(schedulingState.actualStats.customersByTick[2]).toBe(2);
    expect(schedulingState.actualStats.customersByTick[5]).toBe(1);
    expect(schedulingState.actualStats.customersByTick[0]).toBe(0);
  });

  it('recordActualCustomer tickIndex越界应限制在有效范围', () => {
    setupActualStats();
    recordActualCustomer("snack", -5, true, "normal", false);
    recordActualCustomer("snack", 9999, true, "normal", false);
    expect(schedulingState.actualStats.customersByTick[0]).toBe(1);
    expect(schedulingState.actualStats.customersByTick[9]).toBe(1);
  });

  it('recordActualCustomer 替代服务应统计substituteServed', () => {
    setupActualStats();
    recordActualCustomer("snack", 0, true, "normal", true);
    recordActualCustomer("drink", 1, true, "worker", true);
    expect(schedulingState.actualStats.substituteServed).toBe(2);
    expect(schedulingState.actualStats.totalServed).toBe(2);
  });

  it('recordActualCustomer 按顾客类型分别统计servedByType', () => {
    setupActualStats();
    recordActualCustomer("snack", 0, true, "normal", false);
    recordActualCustomer("drink", 1, true, "worker", false);
    recordActualCustomer("noodle", 2, true, "normal", false);
    expect(schedulingState.actualStats.servedByType.normal).toBe(2);
    expect(schedulingState.actualStats.servedByType.worker).toBe(1);
  });

  it('recordActualCustomer 按顾客类型分别统计missedByType', () => {
    setupActualStats();
    recordActualCustomer("snack", 0, false, "picky", false);
    recordActualCustomer("drink", 1, false, "picky", false);
    recordActualCustomer("noodle", 2, false, "nighter", false);
    expect(schedulingState.actualStats.missedByType.picky).toBe(2);
    expect(schedulingState.actualStats.missedByType.nighter).toBe(1);
  });

  it('schedulingState非active时recordActualCustomer应无操作', () => {
    setupActualStats();
    schedulingState.active = false;
    recordActualCustomer("snack", 0, true, "normal", false);
    expect(schedulingState.actualStats.totalServed).toBe(0);
  });

  it('getCurveSegmentForTick 应返回正确的曲线段', () => {
    setupActualStats();
    const seg = getCurveSegmentForTick(3);
    expect(seg).toBeDefined();
    expect(seg.tick).toBe(3);
    expect(seg.intensity).toBeGreaterThan(0);
  });

  it('getCurveSegmentForTick 边界索引应被限制', () => {

    const seg0 = getCurveSegmentForTick(-1);
    const seg9 = getCurveSegmentForTick(100);

    expect(seg9.tick).toBe(9);
  });

});

describe('关键分支逻辑', () => {

  function setupBranch() {
    resetSchedulingState();
  }

  it('跳过排班分支：skip后所有状态应重置为初始值', () => {
    setupBranch();
    schedulingState.active = true;
    schedulingState.selectedStrategy = "steady";
    schedulingState.generatedCurve = [{}, {}];
    schedulingState.expectedStats = { some: "data" };

    schedulingState.active = false;
    schedulingState.selectedStrategy = null;
    schedulingState.generatedCurve = null;
    schedulingState.previewData = null;
    schedulingState.expectedStats = null;

    expect(schedulingState.active).toBe(false);
    expect(schedulingState.selectedStrategy).toBeNull();
    expect(schedulingState.generatedCurve).toBeNull();
    expect(schedulingState.expectedStats).toBeNull();
  });

  it('选择策略分支：selectStrategy后应生成曲线和预期统计', () => {
    setupBranch();
    const origRandom = Math.random;
    Math.random = seededRandom(3000);
    const strategyId = "rushHour";
    const goodKeys = ["snack", "drink", "noodle"];
    const level = { duration: 120, customerBaseGap: 1 };
    const totalTicks = Math.ceil(level.duration / 5);

    schedulingState.active = true;
    schedulingState.selectedStrategy = strategyId;
    const strategy = STRATEGY_TEMPLATES[strategyId];
    const curve = strategy.generateCurve(totalTicks, goodKeys);
    schedulingState.generatedCurve = curve;
    const expectedStats = calculateExpectedStats(curve, goodKeys, level);
    schedulingState.expectedStats = expectedStats;
    Math.random = origRandom;

    expect(schedulingState.active).toBe(true);
    expect(schedulingState.selectedStrategy).toBe("rushHour");
    expect(schedulingState.generatedCurve).toHaveLength(totalTicks);
    expect(schedulingState.expectedStats.totalExpectedCustomers).toBeGreaterThan(0);
    expect(schedulingState.expectedStats.overallRisk).toBeDefined();
  });

  it('不同策略应产出不同的预期统计特征', () => {
    setupBranch();
    const origRandom = Math.random;
    Math.random = seededRandom(3100);
    const goodKeys = ["snack", "drink", "noodle"];
    const level = { duration: 120, customerBaseGap: 1 };
    const totalTicks = Math.ceil(level.duration / 5);

    const steadyCurve = STRATEGY_TEMPLATES.steady.generateCurve(totalTicks, goodKeys);
    const rushCurve = STRATEGY_TEMPLATES.rushHour.generateCurve(totalTicks, goodKeys);
    const steadyStats = calculateExpectedStats(steadyCurve, goodKeys, level);
    const rushStats = calculateExpectedStats(rushCurve, goodKeys, level);
    Math.random = origRandom;

    expect(rushStats.maxIntensity).toBeGreaterThan(steadyStats.maxIntensity);
  });

  it('训练模式强制策略分支：应使用指定forceStrategy', () => {
    setupBranch();
    const theme = TRAINING_THEMES.scheduling;
    expect(theme.config.forceStrategy).toBe("rushHour");
    expect(theme.config.showPreview).toBe(true);

    schedulingState.active = true;
    schedulingState.selectedStrategy = null;

    const forcedStrategy = theme.config.forceStrategy;
    schedulingState.selectedStrategy = forcedStrategy;

    expect(schedulingState.selectedStrategy).toBe("rushHour");
    expect(STRATEGY_TEMPLATES[forcedStrategy]).toBeDefined();
  });

  it('训练模式：强制策略generateCurve应正常工作', () => {
    setupBranch();
    const origRandom = Math.random;
    Math.random = seededRandom(3200);
    const forcedStrategy = TRAINING_THEMES.scheduling.config.forceStrategy;
    const strategy = STRATEGY_TEMPLATES[forcedStrategy];
    const curve = strategy.generateCurve(20, ["snack", "drink", "noodle"]);
    Math.random = origRandom;
    expect(curve).toHaveLength(20);
    curve.forEach(seg => {
      expect(seg.intensity).toBeGreaterThan(0);
    });
  });

  it('返回策略选择分支：应清除已选策略和生成数据', () => {
    setupBranch();
    schedulingState.active = true;
    schedulingState.selectedStrategy = "steady";

    schedulingState.previewData = { b: 2 };

    schedulingState.active = false;
    schedulingState.selectedStrategy = null;
    schedulingState.generatedCurve = null;
    schedulingState.previewData = null;
    schedulingState.expectedStats = null;

    expect(schedulingState.selectedStrategy).toBeNull();
    expect(schedulingState.generatedCurve).toBeNull();
    expect(schedulingState.expectedStats).toBeNull();
  });

  it('startWithSchedulingStrategy分支：应正确初始化actualStats', () => {

function runAllTests() {
  logLines = [];
  const resultsEl = document.getElementById('testResults');
  resultsEl.innerHTML = '';
  log('开始运行测试...');

  let totalPass = 0, totalFail = 0, totalCount = 0;

  testResults.forEach(suite => {
    const suiteEl = document.createElement('div');
    suiteEl.className = 'test-suite';

    let suitePass = 0, suiteFail = 0;
    const testListEl = document.createElement('div');
    testListEl.className = 'test-list';

    suite.tests.forEach(test => {
      totalCount++;
      const testEl = document.createElement('div');
      testEl.className = 'test-item';
      const startTime = performance.now();

      try {
        if (suite.beforeEach) suite.beforeEach();
        test.fn();
        if (suite.afterEach) suite.afterEach();
        const duration = (performance.now() - startTime).toFixed(1);
        suitePass++; totalPass++;
        testEl.classList.add('pass');
        testEl.innerHTML = `
          <span class="test-icon pass">✓</span>
          <span class="test-name">${test.name}</span>
          <span class="test-duration">${duration}ms</span>
        `;
        log(`  ✓ ${test.name}`);
      } catch (e) {
        const duration = (performance.now() - startTime).toFixed(1);
        suiteFail++; totalFail++;
        testEl.classList.add('fail');
        testEl.innerHTML = `
          <span class="test-icon fail">✗</span>
          <div class="test-name">
            ${test.name}
            <div class="error-details">${e.message}</div>
          </div>
          <span class="test-duration">${duration}ms</span>
        `;
        log(`  ✗ ${test.name}: ${e.message}`);
      }
      testListEl.appendChild(testEl);
    });

    const badgeClass = suiteFail === 0 ? 'pass' : 'fail';
    const badgeText = suiteFail === 0 ? `${suitePass} 通过` : `${suitePass} 通过 / ${suiteFail} 失败`;
    const headerEl = document.createElement('div');
    headerEl.className = 'suite-header';
    headerEl.innerHTML = `
      <span>📁 ${suite.name}</span>
      <span class="badge ${badgeClass}">${badgeText}</span>
    `;

    suiteEl.appendChild(headerEl);
    suiteEl.appendChild(testListEl);
    resultsEl.appendChild(suiteEl);
  });

  document.getElementById('totalCount').textContent = totalCount;
  document.getElementById('passCount').textContent = totalPass;
  document.getElementById('failCount').textContent = totalFail;

  const failPlural = totalFail === 0 || totalFail > 1 ? 's' : '';
  log(`完成：${totalPass} 通过，${totalFail} 失败，共 ${totalCount} 个测试用例`);

  document.getElementById('logContent').textContent = logLines.join('\n');
}

window.onload = () => {
  runAllTests();
};
