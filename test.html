<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排班挑战逻辑测试</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: #f4f6f8;
      color: #202733;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.5;
    }
    main { max-width: 980px; margin: 0 auto; }
    h1 { margin: 0 0 6px; font-size: 24px; }
    .subtitle { margin: 0 0 20px; color: #667085; font-size: 14px; }
    .summary {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      padding: 14px 16px;
      margin-bottom: 16px;
      background: #fff;
      border: 1px solid #d9e0e8;
      border-radius: 8px;
    }
    .summary strong { font-size: 18px; }
    .pass strong { color: #198754; }
    .fail strong { color: #c7362f; }
    button {
      margin-left: auto;
      padding: 8px 16px;
      border: 0;
      border-radius: 6px;
      background: #246bfe;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .suite {
      margin-bottom: 14px;
      overflow: hidden;
      background: #fff;
      border: 1px solid #d9e0e8;
      border-radius: 8px;
    }
    .suite-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #f9fafb;
      border-bottom: 1px solid #e7ebf0;
      font-weight: 700;
    }
    .badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge.pass { background: #e9f8ee; color: #198754; }
    .badge.fail { background: #fff0ee; color: #c7362f; }
    .case {
      display: flex;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid #eef1f4;
      font-size: 14px;
    }
    .case:last-child { border-bottom: 0; }
    .case-name { flex: 1; }
    .case.pass .mark { color: #198754; }
    .case.fail .mark, .case.fail .case-name { color: #c7362f; }
    .duration { flex: 0 0 auto; color: #98a2b3; font-size: 12px; }
    .error {
      margin-top: 6px;
      padding: 8px 10px;
      white-space: pre-wrap;
      color: #a12822;
      background: #fff3f1;
      border: 1px solid #ffd0cb;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
    }
    .log {
      margin-top: 18px;
      padding: 14px 16px;
      background: #fff;
      border: 1px solid #d9e0e8;
      border-radius: 8px;
    }
    .log h2 { margin: 0 0 8px; font-size: 15px; }
    pre {
      margin: 0;
      max-height: 260px;
      overflow: auto;
      padding: 10px;
      background: #f7f9fb;
      border-radius: 6px;
      color: #475467;
      font-size: 12px;
    }
    iframe {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      border: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>排班挑战逻辑测试</h1>
    <p class="subtitle">加载真实 index.html/app.js，验证客流曲线、预期统计、实际记录、奖励结算和排班分支。</p>
    <section class="summary">
      <span>总计：<strong id="totalCount">0</strong></span>
      <span class="pass">通过：<strong id="passCount">0</strong></span>
      <span class="fail">失败：<strong id="failCount">0</strong></span>
      <button id="runBtn" type="button">重新运行</button>
    </section>
    <section id="results"></section>
    <section class="log">
      <h2>测试日志</h2>
      <pre id="log">等待运行...</pre>
    </section>
  </main>
  <iframe id="appFrame" title="app under test"></iframe>

  <script>
    const suites = [];
    let currentSuite = null;
    let api = null;
    let appWindow = null;
    let logLines = [];

    function describe(name, fn) {
      currentSuite = { name, tests: [] };
      fn();
      suites.push(currentSuite);
    }

    function it(name, fn) {
      currentSuite.tests.push({ name, fn });
    }

    function expect(actual) {
      return {
        toBe(expected) {
          if (actual !== expected) throw new Error(`期望 ${JSON.stringify(expected)}，实际 ${JSON.stringify(actual)}`);
        },
        toEqual(expected) {
          const a = JSON.stringify(actual);
          const b = JSON.stringify(expected);
          if (a !== b) throw new Error(`期望 ${b}，实际 ${a}`);
        },
        toBeDefined() {
          if (actual === undefined) throw new Error("期望已定义，实际为 undefined");
        },
        toBeNull() {
          if (actual !== null) throw new Error(`期望 null，实际 ${JSON.stringify(actual)}`);
        },
        toBeTruthy() {
          if (!actual) throw new Error(`期望真值，实际 ${JSON.stringify(actual)}`);
        },
        toBeGreaterThan(expected) {
          if (!(actual > expected)) throw new Error(`期望 ${actual} > ${expected}`);
        },
        toBeGreaterThanOrEqual(expected) {
          if (!(actual >= expected)) throw new Error(`期望 ${actual} >= ${expected}`);
        },
        toBeLessThanOrEqual(expected) {
          if (!(actual <= expected)) throw new Error(`期望 ${actual} <= ${expected}`);
        },
        toHaveLength(expected) {
          if (!actual || actual.length !== expected) throw new Error(`期望长度 ${expected}，实际 ${actual && actual.length}`);
        },
        toBeCloseTo(expected, precision = 2) {
          const threshold = Math.pow(10, -precision) / 2;
          if (Math.abs(actual - expected) > threshold) throw new Error(`期望接近 ${expected}，实际 ${actual}`);
        }
      };
    }

    function seededRandom(seed) {
      let s = seed >>> 0;
      return function() {
        s = (s * 1664525 + 1013904223) >>> 0;
        return s / 0xffffffff;
      };
    }

    function withSeed(seed, fn) {
      const original = appWindow.Math.random;
      appWindow.Math.random = seededRandom(seed);
      try {
        return fn();
      } finally {
        appWindow.Math.random = original;
      }
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function loadAppFrame() {
      return new Promise((resolve, reject) => {
        const frame = document.getElementById("appFrame");
        frame.onload = () => {
          appWindow = frame.contentWindow;
          api = appWindow.__schedulingTestApi;
          if (!api) {
            reject(new Error("未找到真实页面测试接口 window.__schedulingTestApi"));
            return;
          }
          api.stopTimer();
          resolve();
        };
        frame.onerror = () => reject(new Error("无法加载 index.html"));
        localStorage.setItem("tutorialCompleted", "true");
        frame.src = `index.html?test=${Date.now()}`;
      });
    }

    function resetApp() {
      api.resetForTest();
      api.stopTimer();
    }

    describe("客流曲线生成", () => {
      it("固定 seed 下平稳客流曲线结果稳定", () => {
        const goodKeys = api.getCurrentLevelGoodKeys();
        const first = withSeed(2024, () => api.STRATEGY_TEMPLATES.steady.generateCurve(12, goodKeys));
        const second = withSeed(2024, () => api.STRATEGY_TEMPLATES.steady.generateCurve(12, goodKeys));
        expect(first).toHaveLength(12);
        expect(first[3].intensity).toBeCloseTo(second[3].intensity, 8);
        expect(first[3].goodWeights.snack).toBeCloseTo(second[3].goodWeights.snack, 8);
      });

      it("下班高峰策略在高峰时段强度高于低峰", () => {
        const curve = withSeed(300, () => api.STRATEGY_TEMPLATES.rushHour.generateCurve(40, api.getCurrentLevelGoodKeys()));
        const peakStart = Math.floor(curve.length * 0.3);
        const peakEnd = Math.floor(curve.length * 0.65);
        let peakSum = 0;
        let lowSum = 0;
        let peakCount = 0;
        let lowCount = 0;
        curve.forEach((segment, index) => {
          if (index >= peakStart && index <= peakEnd) {
            peakSum += segment.intensity;
            peakCount += 1;
          } else {
            lowSum += segment.intensity;
            lowCount += 1;
          }
        });
        expect(peakSum / peakCount).toBeGreaterThan(lowSum / lowCount);
      });

      it("所有策略生成的曲线都包含真实商品权重", () => {
        const goodKeys = api.getCurrentLevelGoodKeys();
        Object.values(api.STRATEGY_TEMPLATES).forEach((strategy, index) => {
          const curve = withSeed(400 + index, () => strategy.generateCurve(10, goodKeys));
          expect(curve).toHaveLength(10);
          curve.forEach(segment => {
            expect(segment.intensity).toBeGreaterThanOrEqual(0.4);
            goodKeys.forEach(key => expect(segment.goodWeights[key]).toBeDefined());
          });
        });
      });
    });

    describe("预期统计计算", () => {
      it("固定输入下预期统计结果稳定且可重复", () => {
        const curve = [
          { tick: 0, intensity: 1.0, goodWeights: { snack: 2, drink: 1, noodle: 1 } },
          { tick: 1, intensity: 1.5, goodWeights: { snack: 1, drink: 2, noodle: 1 } },
          { tick: 2, intensity: 0.5, goodWeights: { snack: 1, drink: 1, noodle: 2 } }
        ];
        const level = { customerBaseGap: 1 };
        const first = api.calculateExpectedStats(curve, ["snack", "drink", "noodle"], level);
        const second = api.calculateExpectedStats(curve, ["snack", "drink", "noodle"], level);
        expect(first).toEqual(second);
        expect(first.totalExpectedCustomers).toBe(4);
        expect(first.pressureTicks).toBe(1);
        expect(first.curveLength).toBe(3);
      });

      it("选择真实策略后生成预期统计和预览数据", () => {
        resetApp();
        withSeed(500, () => api.selectStrategy("rushHour"));
        expect(api.schedulingState.active).toBeTruthy();
        expect(api.schedulingState.selectedStrategy).toBe("rushHour");
        expect(api.schedulingState.generatedCurve.length).toBe(Math.ceil(api.getCurrentLevel().duration / 5));
        expect(api.schedulingState.expectedStats.totalExpectedCustomers).toBeGreaterThan(0);
        expect(api.schedulingState.previewData.curveBars).toHaveLength(20);
      });
    });

    describe("实际经营数据记录", () => {
      it("startWithSchedulingStrategy 使用真实分支初始化 actualStats", () => {
        resetApp();
        withSeed(600, () => api.selectStrategy("steady"));
        api.startWithSchedulingStrategy();
        api.stopTimer();
        expect(api.schedulingState.actualStats.customersByTick).toHaveLength(api.schedulingState.generatedCurve.length);
        expect(api.schedulingState.actualStats.demandByGood.snack).toBe(0);
        expect(api.schedulingState.actualStats.totalServed).toBe(0);
        expect(api.state.running).toBeTruthy();
      });

      it("recordActualCustomer 记录服务、流失、商品、顾客类型和替代服务", () => {
        resetApp();
        withSeed(601, () => api.selectStrategy("steady"));
        api.startWithSchedulingStrategy();
        api.stopTimer();
        api.recordActualCustomer("snack", 2, true, "normal", false);
        api.recordActualCustomer("drink", 2, false, "worker", false);
        api.recordActualCustomer("noodle", 99, true, "picky", true);
        const actual = api.schedulingState.actualStats;
        expect(actual.totalServed).toBe(2);
        expect(actual.totalMissed).toBe(1);
        expect(actual.demandByGood.snack).toBe(1);
        expect(actual.demandByGood.drink).toBe(1);
        expect(actual.demandByGood.noodle).toBe(1);
        expect(actual.customersByTick[2]).toBe(2);
        expect(actual.customersByTick[actual.customersByTick.length - 1]).toBe(1);
        expect(actual.servedByType.normal).toBe(1);
        expect(actual.missedByType.worker).toBe(1);
        expect(actual.substituteServed).toBe(1);
      });
    });

    describe("排班奖励结算", () => {
      it("奖励按真实选中策略和难度倍率结算", () => {
        resetApp();
        api.selectStrategy("steady");
        expect(api.calculateSchedulingBonus(90, 0)).toBe(50);
        api.selectStrategy("rushHour");
        expect(api.calculateSchedulingBonus(90, 0)).toBe(100);
        api.selectStrategy("randomBurst");
        expect(api.calculateSchedulingBonus(85, 1)).toBe(120);
      });

      it("无策略或低服务率高流失时不发奖励", () => {
        resetApp();
        expect(api.calculateSchedulingBonus(90, 0)).toBe(0);
        api.selectStrategy("steady");
        expect(api.calculateSchedulingBonus(50, 10)).toBe(0);
      });
    });

    describe("关键分支逻辑", () => {
      it("跳过排班调用真实 skipSchedulingChallenge 并直接开始营业", () => {
        resetApp();
        api.openSchedulingChallenge();
        withSeed(700, () => api.selectStrategy("steady"));
        api.skipSchedulingChallenge();
        api.stopTimer();
        expect(api.schedulingState.active).toBe(false);
        expect(api.schedulingState.selectedStrategy).toBeNull();
        expect(api.schedulingState.generatedCurve).toBeNull();
        expect(api.state.running).toBeTruthy();
      });

      it("训练模式强制策略调用真实 openSchedulingForTraining 并隐藏跳过按钮", async () => {
        resetApp();
        withSeed(701, () => api.startSchedulingTrainingPreviewForTest());
        await wait(80);
        expect(api.training.active).toBeTruthy();
        expect(api.TRAINING_THEMES.scheduling.config.forceStrategy).toBe("rushHour");
        expect(api.schedulingState.selectedStrategy).toBe("rushHour");
        expect(api.schedulingState.generatedCurve.length).toBeGreaterThan(0);
        expect(api.schedulingState.previewData.curveBars).toHaveLength(20);
        const skipHidden = appWindow.document.getElementById("schedulingSkipBtn").classList.contains("hidden");
        expect(skipHidden).toBeTruthy();
      });
    });

    describe("回放模式回归", () => {
      it("mock 数据构建器生成的帧结构完整且数量匹配", () => {
        const data = api.replayBuildMockData(1, 20);
        expect(data.levelId).toBe(1);
        expect(data.frames).toHaveLength(20);
        expect(data.resultData).toBeDefined();
        expect(data.frames[0].minute).toBe(0);
        expect(data.frames[19].minute).toBe(19);
        expect(data.frames[0].energy).toBe(100);
        expect(data.frames[19].energy).toBeLessThanOrEqual(100);
        expect(data.frames[0].sales).toBe(0);
        expect(data.frames[19].sales).toBe(190);
        data.frames.forEach(f => {
          expect(f.player).toBeDefined();
          expect(f.shelves).toBeDefined();
          expect(f.customers).toBeDefined();
          expect(f.customers.incoming).toBeDefined();
          expect(f.customers.waiting).toBeDefined();
          expect(f.goals).toBeDefined();
        });
      });

      it("进入回放模式后 UI 切换，帧计数正确并可跳帧", () => {
        resetApp();
        const data = api.replayBuildMockData(2, 30);
        api.replayEnterMode(data);
        expect(api.replayPlayer.active).toBeTruthy();
        expect(api.replayGetFrameCount()).toBe(30);
        const bannerHidden = appWindow.document.getElementById("replayBanner").classList.contains("hidden");
        expect(bannerHidden).toBe(false);
        expect(api.replayPlayer.currentFrameIndex).toBe(0);
        expect(api.state.minute).toBe(0);
        api.replayJumpToFrame(10);
        expect(api.replayPlayer.currentFrameIndex).toBe(10);
        expect(api.state.minute).toBe(10);
        expect(api.state.sales).toBe(100);
        api.replayJumpToFrame(999);
        expect(api.replayPlayer.currentFrameIndex).toBe(29);
        expect(api.state.minute).toBe(29);
      });

      it("回放时间格式化按预期补零", () => {
        expect(api.replayFormatTime(0)).toBe("00:00");
        expect(api.replayFormatTime(59)).toBe("00:59");
        expect(api.replayFormatTime(60)).toBe("01:00");
        expect(api.replayFormatTime(125)).toBe("02:05");
      });

      it("回放入口使用固定 seed 录得的数据能存入和清出 localStorage", () => {
        resetApp();
        api.replayClearFromStorage();
        expect(api.replayHasSaved()).toBe(false);
        const data = withSeed(1234, () => api.replayBuildMockData(3, 15));
        api.replaySaveToStorage(data);
        expect(api.replayHasSaved()).toBe(true);
        const loaded = api.replayLoadSaved();
        expect(loaded.levelId).toBe(3);
        expect(loaded.frames).toHaveLength(15);
        expect(loaded.resultData.score).toBe(75);
        api.replayClearFromStorage();
        expect(api.replayHasSaved()).toBe(false);
      });

      it("跳转到最后一帧后使用与录入一致的 seed 数据一致", () => {
        resetApp();
        const data1 = withSeed(777, () => api.replayBuildMockData(1, 25));
        const data2 = withSeed(777, () => api.replayBuildMockData(1, 25));
        expect(JSON.stringify(data1.frames[12].player)).toEqual(JSON.stringify(data2.frames[12].player));
        expect(JSON.stringify(data1.resultData)).toEqual(JSON.stringify(data2.resultData));
        api.replayEnterMode(data1);
        api.replayJumpToFrame(12);
        expect(api.state.sales).toBe(120);
        expect(api.state.minute).toBe(12);
      });

      it("退出回放模式后状态还原，横幅隐藏", () => {
        resetApp();
        api.currentLevelId = 1;
        const stateBefore = { sales: api.state.sales, minute: api.state.minute, energy: api.state.energy };
        const data = api.replayBuildMockData(2, 20);
        api.replayEnterMode(data);
        api.replayJumpToFrame(15);
        expect(api.currentLevelId).toBe(2);
        api.replayExitMode();
        expect(api.replayPlayer.active).toBe(false);
        const bannerHidden = appWindow.document.getElementById("replayBanner").classList.contains("hidden");
        expect(bannerHidden).toBe(true);
        expect(api.state.sales).toBe(stateBefore.sales);
        expect(api.state.minute).toBe(stateBefore.minute);
        expect(api.state.energy).toBe(stateBefore.energy);
        expect(api.currentLevelId).toBe(1);
      });

      it("进入回放模式后再调用 resetForTest 可正常清理回放状态", () => {
        resetApp();
        api.replayEnterMode(api.replayBuildMockData(1, 10));
        expect(api.replayPlayer.active).toBeTruthy();
        resetApp();
        expect(api.replayPlayer.active).toBe(false);
        expect(api.replayGetFrameCount()).toBe(0);
        const bannerHidden = appWindow.document.getElementById("replayBanner").classList.contains("hidden");
        expect(bannerHidden).toBe(true);
      });
    });

    describe("训练模式回归", () => {
      it("所有训练主题配置完整，含 id/name/config/难度标签", () => {
        const themes = Object.values(api.TRAINING_THEMES);
        expect(themes.length).toBeGreaterThanOrEqual(4);
        themes.forEach(theme => {
          expect(theme.id).toBeDefined();
          expect(theme.name).toBeDefined();
          expect(theme.icon).toBeDefined();
          expect(theme.difficulty).toBeDefined();
          expect(theme.difficultyLabel).toBeDefined();
          expect(theme.description).toBeDefined();
          expect(Array.isArray(theme.objectives)).toBeTruthy();
          expect(theme.objectives.length).toBeGreaterThan(0);
          expect(typeof theme.config).toBe("object");
        });
      });

      it("getTrainingConfigOverride 在非训练模式返回默认值", () => {
        resetApp();
        expect(api.training.active).toBe(false);
        expect(api.getTrainingConfigOverride("customerBaseGap", 3)).toBe(3);
        expect(api.getTrainingConfigOverride("duration", 120)).toBe(120);
      });

      it("queue 主题按配置覆盖 gap 与等待时间", () => {
        resetApp();
        api.trainingSetTheme("queue", 1);
        api.training.active = true;
        expect(api.getTrainingConfigOverride("customerBaseGap", 3)).toBe(1);
        expect(api.getTrainingConfigOverride("customerWaitMin", 3)).toBe(2);
        expect(api.getTrainingConfigOverride("customerWaitMax", 6)).toBe(4);
      });

      it("event 主题按配置缩短事件最小间隔", () => {
        resetApp();
        api.trainingSetTheme("event", 1);
        api.training.active = true;
        expect(api.getTrainingConfigOverride("eventMinGap", 5)).toBe(2);
        expect(api.getTrainingConfigOverride("eventBaseChance", 0.25)).toBe(0.55);
      });

      it("dualCarry 主题强制双手搬运标记打开", () => {
        resetApp();
        api.trainingSetTheme("dualCarry", 1);
        api.training.active = true;
        expect(api.getTrainingConfigOverride("forceDualCarry", false)).toBe(true);
      });

      it("durationMultiplier 正确按比例计算并向下取整", () => {
        resetApp();
        api.trainingSetTheme("queue", 1);
        api.training.active = true;
        const v = api.getTrainingConfigOverride("duration", 100);
        expect(v).toBe(80);
        expect(Number.isInteger(v)).toBe(true);
      });

      it("训练设置主题后可正确切回原始关卡", async () => {
        resetApp();
        const original = api.currentLevelId;
        api.trainingSetTheme("queue", 2);
        expect(api.currentLevelId).toBe(2);
        api.trainingExitSession(false);
        expect(api.training.active).toBe(false);
        expect(api.currentLevelId).toBe(original);
        const bannerHidden = appWindow.document.getElementById("trainingBanner").classList.contains("hidden");
        expect(bannerHidden).toBe(true);
      });

      it("trainingGetFinalState 返回训练结束时的状态快照", () => {
        resetApp();
        api.trainingSetTheme("queue", 1);
        api.training.active = true;
        const snap = api.trainingGetFinalState();
        expect(typeof snap.sales).toBe("number");
        expect(typeof snap.misses).toBe("number");
        expect(typeof snap.energy).toBe("number");
        expect(typeof snap.served).toBe("number");
        expect(typeof snap.missed).toBe("number");
        expect(typeof snap.running).toBe("boolean");
        expect(snap.active).toBe(true);
      });

      it("resetForTest 会关闭训练标志并隐藏训练横幅", () => {
        resetApp();
        api.trainingSetTheme("queue", 1);
        api.training.active = true;
        const banner = appWindow.document.getElementById("trainingBanner");
        banner.classList.remove("hidden");
        resetApp();
        expect(api.training.active).toBe(false);
        expect(api.training.themeId).toBeNull();
        expect(banner.classList.contains("hidden")).toBe(true);
      });

      it("scheduling 训练主题预览 + 强制 rushHour 策略与原测试一致", async () => {
        resetApp();
        withSeed(901, () => api.startSchedulingTrainingPreviewForTest());
        await wait(80);
        expect(api.training.active).toBeTruthy();
        expect(api.TRAINING_THEMES.scheduling.config.forceStrategy).toBe("rushHour");
        expect(api.schedulingState.selectedStrategy).toBe("rushHour");
        expect(api.schedulingState.generatedCurve.length).toBeGreaterThan(0);
        expect(api.schedulingState.previewData.curveBars).toHaveLength(20);
        const skipHidden = appWindow.document.getElementById("schedulingSkipBtn").classList.contains("hidden");
        expect(skipHidden).toBeTruthy();
      });
    });

    describe("基础工具与状态护栏", () => {
      it("setPlayerPos 能正确移动玩家并触发渲染", () => {
        resetApp();
        api.setPlayerPos(2, 3);
        expect(api.state.player.x).toBe(2);
        expect(api.state.player.y).toBe(3);
      });

      it("setShelfStock 按 max 上限裁剪输入值", () => {
        resetApp();
        const shelf = api.getShelfById("A");
        expect(shelf).toBeDefined();
        const after = api.setShelfStock("A", shelf.max + 10);
        expect(after).toBe(shelf.max);
        const zero = api.setShelfStock("A", -5);
        expect(zero).toBe(0);
      });

      it("三个关卡配置均可在 levels 中查找并包含 goodKeys", () => {
        [1, 2, 3].forEach(id => {
          const lv = api.levels.find(l => l.id === id);
          expect(lv).toBeDefined();
          expect(Array.isArray(lv.goodKeys)).toBeTruthy();
          expect(lv.goodKeys.length).toBeGreaterThan(0);
        });
      });

      it("goodKeys 中的每种商品在 goods 字典中均有定义", () => {
        api.levels.forEach(lv => {
          lv.goodKeys.forEach(k => {
            expect(api.goods[k]).toBeDefined();
            expect(typeof api.goods[k].name).toBe("string");
            expect(typeof api.goods[k].price).toBe("number");
          });
        });
      });
    });

    async function runAllTests() {
      const runBtn = document.getElementById("runBtn");
      runBtn.disabled = true;
      logLines = [];
      document.getElementById("results").innerHTML = "";
      document.getElementById("log").textContent = "加载真实页面...\n";
      try {
        await loadAppFrame();
      } catch (error) {
        document.getElementById("log").textContent = error.message;
        runBtn.disabled = false;
        return;
      }

      let total = 0;
      let pass = 0;
      let fail = 0;
      const results = document.getElementById("results");

      for (const suite of suites) {
        const suiteEl = document.createElement("section");
        suiteEl.className = "suite";
        const listEl = document.createElement("div");
        let suitePass = 0;
        let suiteFail = 0;

        for (const test of suite.tests) {
          total += 1;
          const item = document.createElement("div");
          const start = performance.now();
          try {
            resetApp();
            await test.fn();
            api.stopTimer();
            const duration = (performance.now() - start).toFixed(1);
            pass += 1;
            suitePass += 1;
            item.className = "case pass";
            item.innerHTML = `<span class="mark">✓</span><span class="case-name">${test.name}</span><span class="duration">${duration}ms</span>`;
            logLines.push(`✓ ${suite.name} / ${test.name}`);
          } catch (error) {
            api && api.stopTimer();
            const duration = (performance.now() - start).toFixed(1);
            fail += 1;
            suiteFail += 1;
            item.className = "case fail";
            item.innerHTML = `<span class="mark">✗</span><div class="case-name">${test.name}<div class="error">${error.stack || error.message}</div></div><span class="duration">${duration}ms</span>`;
            logLines.push(`✗ ${suite.name} / ${test.name}: ${error.message}`);
          }
          listEl.appendChild(item);
        }

        const header = document.createElement("div");
        header.className = "suite-header";
        header.innerHTML = `<span>${suite.name}</span><span class="badge ${suiteFail ? "fail" : "pass"}">${suitePass} 通过${suiteFail ? ` / ${suiteFail} 失败` : ""}</span>`;
        suiteEl.appendChild(header);
        suiteEl.appendChild(listEl);
        results.appendChild(suiteEl);
      }

      document.getElementById("totalCount").textContent = total;
      document.getElementById("passCount").textContent = pass;
      document.getElementById("failCount").textContent = fail;
      logLines.push(`完成：${pass} 通过，${fail} 失败，共 ${total} 个测试用例`);
      document.getElementById("log").textContent = logLines.join("\n");
      runBtn.disabled = false;
    }

    document.getElementById("runBtn").addEventListener("click", runAllTests);
    window.addEventListener("load", runAllTests);
  </script>
</body>
